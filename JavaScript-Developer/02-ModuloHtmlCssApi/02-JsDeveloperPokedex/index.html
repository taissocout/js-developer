<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex | API Study</title>

    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/pokedex.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <section class="pokedex-container">
        <div class="pokedex-header">
            <h1>Pokedex</h1>
        </div>

        <!-- LISTA -->
        <ol id="pokemonList" class="pokemons-grid"></ol>

        <!-- BOTÃO -->
        <div class="pagination-wrapper">
            <button id="loadMoreButton">Carregar Mais</button>
        </div>

        <!-- CONTADOR -->
        <div class="api-status">
            <span><strong id="pokemonCount">0</strong> Pokémon carregados</span>
        </div>
    </section>

</div>

<!-- ============================================
     MODAL (ÚNICO E CORRETO)
============================================ -->
<div id="pokemonModal" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h2 id="modalPokemonName"></h2>
            <span class="modal-close">&times;</span>
        </div>

        <div class="modal-body">

            <div class="modal-image-container">
                <img id="modalPokemonImage" class="modal-image">
            </div>

            <div class="info-section">
                <p><strong>Número:</strong> <span id="modalPokemonNumber"></span></p>
                <p><strong>Nome:</strong> <span id="modalPokemonName2"></span></p>
                <p><strong>Tipos:</strong> <span id="modalPokemonTypes"></span></p>
            </div>

            <div class="info-section">
                <h3>Status</h3>
                <div id="modalPokemonStats"></div>
            </div>

            <div class="info-section">
                <p><strong>Altura:</strong> <span id="modalPokemonHeight"></span></p>
                <p><strong>Peso:</strong> <span id="modalPokemonWeight"></span></p>
                <p><strong>EXP:</strong> <span id="modalPokemonExp"></span></p>
            </div>

            <div class="info-section">
                <p><strong>Habilidade:</strong> <span id="modalPokemonAbility"></span></p>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="assets/js/pokemon-model.js"></script>
<script src="assets/js/poke-api.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
